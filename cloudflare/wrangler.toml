name = "stell-webhook"
main = "worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Custom route (Cloudflare Dashboard'da da ayarlanabilir)
# routes = [{ pattern = "stell.stellcodex.com/stell/webhook", zone_name = "stellcodex.com" }]

[vars]
# Bu değerleri Cloudflare Dashboard → Workers → Settings → Variables'a ekle (secret olarak):
# WHATSAPP_TOKEN
# WEBHOOK_VERIFY_TOKEN
# STELL_OWNER_PHONE
# PHONE_NUMBER_ID
# GITHUB_TOKEN
# GITHUB_REPO           = "kullaniciadi/stell-assistant"
# BACKEND_URL           = "https://stellcodex.com/api/v1"
# BACKEND_ADMIN_TOKEN   = "..."  (opsiyonel)
